<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <title>Telogify</title>
    <script>
      // Apply the saved theme before paint so there's no flash of the wrong palette.
      try {
        var t = localStorage.getItem('theme')
        if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t
      } catch (e) {}
    </script>
    <style>
      /* index.css's --color-bg only applies once the bundled stylesheet loads (it's imported
         via the JS module, not linked here), so without this the browser paints its own default
         white background first. These two lines mirror --color-bg for both themes so the very
         first paint is already on-brand instead of a white flash. */
      html, body { background-color: #fffdd0; }
      html[data-theme='dark'], html[data-theme='dark'] body { background-color: oklch(0.192 0.009 55); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
