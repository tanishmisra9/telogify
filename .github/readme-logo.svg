<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 232 94" width="232" height="94">
  <!-- README-only lockup mirroring components/Nav.tsx: LogoMark + "Telo" + accent "gify" at
       the site's actual nav weight (400, no bold class there either -> Instrument Sans
       renders normal; Arial/Helvetica normal is the closest websafe match for an <img>-embedded
       SVG, which can't reliably load a remote @font-face), underlined in accent like the nav's
       active-route border, plus a single-line tagline below (not part of the app itself). The
       tagline is now the widest element, so the icon+wordmark line is centered under IT
       (cx=116); the underline still spans only the icon+wordmark's own measured width. -->
  <style>
    .ink { stroke: #37322d; fill: #37322d; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #f2ede4; fill: #f2ede4; }
    }
  </style>
  <g fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="translate(42.5, 13)">
    <path class="ink" d="M2 16 L6 7 L10 25 L13 11 L16 20 L18 16" />
    <path d="M18 16 L30 16" stroke="#e10600" />
  </g>
  <text x="80.5" y="42" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="34" letter-spacing="-0.85">
    <tspan class="ink">Telo</tspan><tspan fill="#e10600">gify</tspan>
  </text>
  <line x1="42.5" y1="58" x2="190" y2="58" stroke="#e10600" stroke-width="2" />
  <text x="116" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="17" class="ink">Every weekend, cut the noise.</text>
</svg>
