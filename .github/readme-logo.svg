<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 164 112" width="164" height="112">
  <!-- README-only lockup mirroring components/Nav.tsx: LogoMark + "Telo" + accent "gify",
       underlined in accent like the nav's active-route border, plus a tagline below (not
       part of the app itself). All three lines share one horizontal center (cx=82) so the
       lockup is genuinely centered when the whole image is centered on the page; the
       underline is sized to the wordmark's measured bounding box, not the canvas width. -->
  <style>
    .ink { stroke: #37322d; fill: #37322d; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #f2ede4; fill: #f2ede4; }
    }
  </style>
  <g fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 13)">
    <path class="ink" d="M2 16 L6 7 L10 25 L13 11 L16 20 L18 16" />
    <path d="M18 16 L30 16" stroke="#e10600" />
  </g>
  <text x="40" y="42" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="34" letter-spacing="-0.5">
    <tspan class="ink">Telo</tspan><tspan fill="#e10600">gify</tspan>
  </text>
  <line x1="0" y1="58" x2="164" y2="58" stroke="#e10600" stroke-width="2" />
  <text x="82" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="17" class="ink">Every weekend,</text>
  <text x="82" y="102" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="17" class="ink">cut the noise.</text>
</svg>
