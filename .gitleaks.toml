title = "Telogify gitleaks config"

# Start from gitleaks' built-in ruleset (AWS keys, generic API keys/tokens,
# private key blocks, provider-specific tokens, etc.) instead of hand-rolling
# detection rules.
[extend]
useDefault = true

[allowlist]
# Checked-in, deliberately empty placeholder env files -- never contain a
# real value, so excluding them by path is cheap insurance rather than
# something we need a rule to actually catch.
paths = [
  '''backend/\.env\.example''',
  '''frontend/\.env\.example''',
]
